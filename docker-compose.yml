# Stack : PostgreSQL, pgAdmin, backend Spring Boot, Jenkins CI
# Réseau fleet_net : jobs Maven (docker run) joignent postgres:5432
name: fleet_management

services:
  postgres:
    image: postgres:16
    container_name: fleet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fleet_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: fleet_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fleet_net

  backend:
    build: .
    container_name: fleet_backend
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fleet_db
      SPRING_DATASOURCE_USERNAME: fleet
      SPRING_DATASOURCE_PASSWORD: fleet
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fleet_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  fleet_net:
    name: fleet_net
    driver: bridge
